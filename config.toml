[ingestor]
usd_threshold = 10_000          # Minimum trade size in USD to display
ws_url = "wss://ws-live-data.polymarket.com"
reconnect_delay_sec = 5         # Delay before WebSocket reconnect attempt

[market_cache]
gamma_url = "https://gamma-api.polymarket.com"
ttl_minutes = 60                # Cache market metadata for 1 hour

[profiler]
data_api_url = "https://data-api.polymarket.com"
max_trades_to_fetch = 200       # Max trades to paginate for deep profile
wallet_cache_ttl_minutes = 30   # Cache wallet profiles for 30 min

[event_cache]
gamma_url = "https://gamma-api.polymarket.com"
ttl_minutes = 120               # Events change less often than markets

[display]
max_rows = 50                   # Max trades shown in live table

# ── Insider Thesis ──────────────────────────────

[thesis.insider]
enabled = true
categories = []                    # empty = all non-excluded
exclude_categories = ["Crypto", "Sports"]  # Sports handled by sporty_investor

[thesis.insider.detector.fresh_wallet]
max_prior_trades = 5            # Wallets with <= this many trades are "fresh"
multiplier_zero = 3.0           # 0 prior trades
multiplier_low = 2.0            # 1-2 prior trades (collapsed with mid: 1-5 = single tier)
multiplier_mid = 2.0            # 3-5 prior trades

[thesis.insider.detector.size_anomaly]
min_trade_usd = 10_000          # Noise floor
orderbook_impact_pct = 0.02     # Reserved for CLOB integration
volume_spike_multiplier = 5.0   # Reserved
multiplier_low = 1.5            # 2-5% of 24h volume
multiplier_mid = 2.0            # 5-10% of 24h volume
multiplier_high = 3.0           # 10%+ of 24h volume

[thesis.insider.detector.niche_market]
max_daily_volume_usd = 50_000   # Markets below this are "niche"
multiplier_low = 1.5            # $25K-$50K daily
multiplier_mid = 2.2            # $10K-$25K daily
multiplier_high = 2.8           # <$10K daily

[thesis.insider.detector.entry_price]
sweet_spot_low = 0.35
sweet_spot_high = 0.50
multiplier_sweet = 1.0           # no boost — insider entry price is not a positive signal
multiplier_adjacent = 1.0        # no boost
near_certainty_threshold = 0.85  # B1: dampen near-certainty bets (reward farming / noise)
near_certainty_multiplier = 0.5

[thesis.insider.detector.mm_filter]
enabled = true                   # Toggle MM filter on/off
settle_delay_seconds = 7         # Wait for settlement pair to arrive in DB
pair_max_gap_seconds = 14        # Max gap to detect matched settlement pairs
wallet_lookback_minutes = 120    # Same-wallet opposite-side lookback window

[thesis.insider.scorer]
alert_threshold = 7             # Score >= 7 triggers alert
critical_threshold = 9          # Score >= 9 triggers critical

[thesis.insider.paper]
enabled = true                   # Toggle paper trading on/off
starting_capital = 5_000_000     # Simulated capital pool (USD)
base_position_usd = 5_000       # Base position size before score scaling
max_position_pct = 0.10          # Max 10% of capital per single position
max_exposure_pct = 0.50          # Max 50% of capital deployed at once
max_concurrent = 100             # Max simultaneous open positions
min_score = 7.0                  # Minimum composite score to trigger entry
max_days_to_resolution = 30      # Skip markets resolving more than N days out

# ── Sporty Investor Thesis ──────────────────────

[thesis.sporty_investor]
enabled = true
categories = ["Sports"]
exclude_categories = []

[thesis.sporty_investor.detector.timing_gate]
min_hours_before = 0              # must be placed before game start

[thesis.sporty_investor.detector.entry_price]
sweet_spot_low = 0.35
sweet_spot_high = 0.50
multiplier_sweet = 1.0       # flattened — no entry price boost until data supports it
multiplier_adjacent = 1.0    # flattened — 48 positions insufficient to validate sweet spot
near_certainty_threshold = 0.85
near_certainty_multiplier = 0.5  # keep near-certainty dampen

[thesis.sporty_investor.detector.niche_nonlinear]
sweet_spot_low_vol = 5_000    # expanded from $10K — $5K-$25K sweet spot
sweet_spot_high_vol = 25_000
multiplier_sweet = 2.0
multiplier_adjacent = 1.0     # dropped from 1.5 — $25K-$50K has no empirical edge

[thesis.sporty_investor.detector.wallet_experience]
sweet_spot_low = 6
sweet_spot_high = 25
multiplier_sweet = 1.8
multiplier_mid = 1.3
multiplier_high = 1.5

[thesis.sporty_investor.detector.mm_filter]
enabled = true
settle_delay_seconds = 7
pair_max_gap_seconds = 14
wallet_lookback_minutes = 120

[thesis.sporty_investor.scorer]
alert_threshold = 5               # TBD: validate in Slice 0
critical_threshold = 8

[thesis.sporty_investor.paper]
enabled = true
starting_capital = 5_000_000
base_position_usd = 3_000
max_position_pct = 0.05
max_exposure_pct = 0.40
max_concurrent = 100
min_score = 5.0                   # TBD: validate in Slice 0
max_days_to_resolution = 30

# ── Resolution Poller ─────────────────────────────
# Thesis-agnostic: polls Gamma API for resolved markets and closes paper positions

[resolution]
poll_interval_minutes = 15        # Background poller frequency
request_delay_seconds = 1.0       # Rate limit between Gamma API calls
